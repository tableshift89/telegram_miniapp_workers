<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Облік цеху</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Цех <span id="workshop-name"></span></h1>
            <div class="shift-info">⚙️ Зміна: <span id="shift-hours">8</span> год</div>
        </div>

        <div class="add-worker">
            <input type="text" id="new-worker-name" placeholder="Прізвище Ім'я По батькові">
            <button id="add-worker-btn">➕ Додати</button>
        </div>

        <div class="workers-list" id="workers-list"></div>

        <div class="other-controls" style="display: none;">
            <h3>Вибір причини невиходу</h3>
            <div id="other-buttons"></div>
            <button id="submit-other">📤 Надіслати</button>
        </div>

        <button id="show-result">📊 Показати результат</button>
        <div id="result-table" style="display: none;"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
