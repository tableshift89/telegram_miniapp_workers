<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Облік цеху</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; min-height: 100vh; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            width: 100%;
            min-height: 100vh;
            background: rgba(255,255,255,0.95);
            border-radius: 0;
            padding: 16px;
            box-shadow: none;
        }
        .header { text-align: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e0; }
        h1 { font-size: 22px; color: #333; }
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
            font-weight: normal;
        }
        .mode-active { background: #f59e0b; color: white; }
        .mode-normal { background: #10b981; color: white; }
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .date-selector {
            flex: 2;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 16px;
        }
        .date-selector label { display: block; font-size: 10px; font-weight: 600; color: #555; margin-bottom: 2px; }
        #date-picker { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; text-align: center; }
        .hours-selector {
            flex: 1;
            min-width: 100px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 16px;
        }
        .hours-selector label { display: block; font-size: 10px; font-weight: 600; color: #555; margin-bottom: 2px; }
        .hours-selector select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; background: white; }
        .add-worker-btn {
            background: #10b981;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 24px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .add-worker-btn:active { transform: scale(0.95); }
        .workers-list { margin: 16px 0; }
        .worker-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-left: 3px solid #667eea;
            transition: all 0.3s;
        }
        .worker-card.removed { display: none; }
        .worker-card.outsourcer { border-left-color: #f59e0b; background: #fffbeb; }
        .worker-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .worker-name { font-weight: 600; font-size: 14px; color: #333; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .outsourcer-badge { background: #f59e0b; color: white; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .suggestion-badge { background: #e8ecf1; padding: 4px 8px; border-radius: 20px; font-size: 10px; color: #667eea; }
        .worker-controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .field-group { flex: 1; min-width: 80px; }
        .field-group label { display: block; font-size: 10px; color: #888; margin-bottom: 2px; }
        .to-select, .status-select, .ktu-select { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; background: #f9f9f9; }
        .hours-input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; background: #f9f9f9; }
        .custom-input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #f59e0b; font-size: 12px; background: #fff8e1; }
        .action-btn {
            background: #10b981;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        .absent-action-btn {
            background: #f59e0b;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .absent-action-btn:active { transform: scale(0.95); }
        .other-btn { background: #8b5cf6; border: none; border-radius: 20px; padding: 8px 12px; font-size: 11px; color: white; cursor: pointer; margin-top: 4px; width: 100%; }
        .absent-mode-btn, .sync-btn { width: 100%; margin: 10px 0; padding: 12px; border-radius: 28px; font-size: 14px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .absent-mode-btn { background: #f59e0b; color: white; border: none; }
        .sync-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; }
        .absent-mode-active { background: #10b981 !important; }
        .connection-status { margin-top: 16px; padding: 8px; background: #f5f5f5; border-radius: 16px; display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.connected { background: #10b981; box-shadow: 0 0 4px #10b981; }
        .status-indicator.disconnected { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
        .status-indicator.checking { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .empty-message, .loading, .error { text-align: center; padding: 20px; font-size: 13px; color: #666; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 20px; border-radius: 40px; font-size: 12px; z-index: 1000; animation: fadeInUp 0.3s ease; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .new-worker-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; width: 90%; max-width: 320px; }
        .modal-content h3 { margin-bottom: 16px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 28px; margin-bottom: 16px; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 16px; justify-content: center; }
        .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 28px; border: none; font-weight: bold; cursor: pointer; }
        .modal-buttons button:first-child { background: #10b981; color: white; }
        .modal-buttons button:last-child { background: #ef4444; color: white; }
        .to-warning { background: #fef3c7; border-left-color: #f59e0b; }
        .warning-text { color: #f59e0b; font-size: 11px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 ЦЕХ <span id="workshop-name"></span>
                <span id="mode-badge" class="mode-badge mode-normal">✅ Режим присутності</span>
            </h1>
        </div>

        <div class="controls-row">
            <div class="date-selector">
                <label>📅 Дата:</label>
                <input type="text" id="date-picker" placeholder="Виберіть дату">
            </div>
            <div class="hours-selector">
                <label>⚙️ Зміна:</label>
                <select id="shift-select">
                    <option value="7">7 годин</option>
                    <option value="8" selected>8 годин</option>
                    <option value="9">9 годин</option>
                </select>
            </div>
            <button id="add-worker-btn" class="add-worker-btn" title="Додати працівника">+</button>
        </div>

        <div class="workers-list" id="workers-list">
            <div class="loading">📥 Завантаження...</div>
        </div>

        <button id="absent-mode-btn" class="absent-mode-btn">📋 Відмітити відсутніх</button>
        <button id="sync-btn" class="sync-btn">🔄 Синхронізувати з табелем</button>

        <div class="connection-status" id="connection-status">
            <span class="status-indicator" id="status-indicator"></span>
            <span id="status-text">Перевірка підключення...</span>
        </div>
    </div>

    <div id="new-worker-modal" class="new-worker-modal" style="display: none;">
        <div class="modal-content">
            <h3>➕ Додати нового працівника</h3>
            <input type="text" id="new-worker-name" placeholder="Прізвище Ім'я По батькові">
            <div class="radio-group">
                <label>
                    <input type="radio" name="worker-type" value="official" checked> Офіційний
                </label>
                <label>
                    <input type="radio" name="worker-type" value="outsourcer"> Аутсорс (А)
                </label>
            </div>
            <div class="modal-buttons">
                <button id="confirm-add-worker">Додати</button>
                <button id="cancel-add-worker">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            tg.setBackgroundColor('#667eea');
            tg.setHeaderColor('#764ba2');

            let workshop = decodeURIComponent(window.location.pathname.split('/').pop());
            if (workshop === 'DMT') workshop = 'ДМТ';
            document.getElementById('workshop-name').innerText = workshop;

            let selectedDate = new Date().toISOString().split('T')[0];
            let workersData = [];
            let operations = ['601', '602', '603', '475', '1088', '1256'];
            let absentMode = false;
            let defaultShiftHours = 8;

            const modeBadge = document.getElementById('mode-badge');
            const shiftSelect = document.getElementById('shift-select');

            async function checkConnection() {
                const indicator = document.getElementById('status-indicator');
                const text = document.getElementById('status-text');
                indicator.className = 'status-indicator checking';
                text.innerText = 'Перевірка...';
                try {
                    const res = await fetch('/api/check-connection');
                    const data = await res.json();
                    if (data.connected) {
                        indicator.className = 'status-indicator connected';
                        text.innerText = '✅ Підключено до Google Табелю';
                    } else {
                        indicator.className = 'status-indicator disconnected';
                        text.innerText = '❌ Немає зв\'язку';
                    }
                } catch(e) {
                    indicator.className = 'status-indicator disconnected';
                    text.innerText = '❌ Помилка з\'єднання';
                }
            }

            async function loadOperations() {
                try {
                    const res = await fetch('/api/operations');
                    const data = await res.json();
                    if (data.operations) operations = data.operations;
                } catch(e) { console.error(e); }
            }

            async function loadShiftData() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '<div class="loading">📥 Завантаження...</div>';
                try {
                    const res = await fetch(`/api/shift-data?date=${selectedDate}`);
                    const data = await res.json();
                    if (data.ok) {
                        workersData = data.workers || [];
                        workersData.forEach(worker => {
                            if (!worker.hours || worker.hours === '') {
                                worker.hours = defaultShiftHours.toString();
                            }
                        });
                        renderWorkersList();
                    } else {
                        container.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    }
                } catch(e) {
                    container.innerHTML = '<div class="error">❌ Помилка завантаження</div>';
                }
            }

            function applyHoursToAll() {
                const newHours = shiftSelect.value;
                defaultShiftHours = parseInt(newHours);
                workersData.forEach(worker => {
                    worker.hours = newHours;
                });
                renderWorkersList();
                showToast(`✅ Години змінено на ${newHours} для всіх`, 'success');
            }

            async function addNewWorker(fullname, isOutsourcer) {
                try {
                    const response = await fetch('/api/add-worker', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fullname: fullname,
                            workshop: workshop === 'ДМТ' ? 'DMT' : 'Пакування',
                            isOutsourcer: isOutsourcer
                        })
                    });
                    const result = await response.json();
                    if (result.ok) {
                        showToast(`✅ Працівника ${fullname} додано!`, 'success');
                        await loadShiftData();
                    } else {
                        showToast('❌ Помилка додавання працівника', 'error');
                    }
                } catch(e) {
                    console.error('Error adding worker:', e);
                    showToast('❌ Помилка додавання працівника', 'error');
                }
            }

            function validateWorker(worker) {
                if (!worker.to || worker.to === '') {
                    showToast(`❌ ${worker.fullname}: виберіть ТО!`, 'error');
                    return false;
                }
                return true;
            }

            async function markPresent(worker) {
                if (!validateWorker(worker)) return;
                
                try {
                    const response = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: selectedDate,
                            workers: [{
                                row: worker.row,
                                fullname: worker.fullname,
                                to: worker.to || '',
                                hours: worker.hours || defaultShiftHours.toString(),
                                status: null,
                                ktu: worker.ktu || 1
                            }]
                        })
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        showToast(`✅ ${worker.fullname} відмічено!`, 'success');
                        const card = document.querySelector(`.worker-card[data-row="${worker.row}"]`);
                        if (card) {
                            card.classList.add('removed');
                            setTimeout(() => card.remove(), 300);
                        }
                        workersData = workersData.filter(w => w.row !== worker.row);
                    } else {
                        showToast(`❌ Помилка: ${result.error}`, 'error');
                    }
                } catch(e) {
                    console.error('Error marking present:', e);
                    showToast('❌ Помилка відмітки', 'error');
                }
            }

            async function markAbsent(worker) {
                if (!worker.status) {
                    showToast('❌ Виберіть статус відсутності!', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: selectedDate,
                            workers: [{
                                row: worker.row,
                                fullname: worker.fullname,
                                to: '',
                                hours: '',
                                status: worker.status,
                                ktu: null
                            }]
                        })
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        let statusText = '';
                        if (worker.status === 'Вщ') statusText = 'Вихідний';
                        else if (worker.status === 'В') statusText = 'Відпустка';
                        else if (worker.status === 'На') statusText = 'За свій рахунок';
                        else if (worker.status === 'Пр') statusText = 'Прогул';
                        else if (worker.status === 'Нз') statusText = 'Не з\'явився';
                        showToast(`✅ ${worker.fullname} - ${statusText}`, 'success');
                        
                        const card = document.querySelector(`.worker-card[data-row="${worker.row}"]`);
                        if (card) {
                            card.classList.add('removed');
                            setTimeout(() => card.remove(), 300);
                        }
                        workersData = workersData.filter(w => w.row !== worker.row);
                    } else {
                        showToast(`❌ Помилка: ${result.error}`, 'error');
                    }
                } catch(e) {
                    console.error('Error marking absent:', e);
                    showToast('❌ Помилка відмітки', 'error');
                }
            }

            function renderWorkersList() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '';
                
                if (!workersData || workersData.length === 0) {
                    container.innerHTML = '<div class="empty-message">✅ Всі працівники відмічені!</div>';
                    return;
                }

                workersData.forEach(worker => {
                    const card = document.createElement('div');
                    card.className = 'worker-card';
                    if (worker.isOutsourcer) {
                        card.classList.add('outsourcer');
                    }
                    if (!worker.to && !worker.status) {
                        card.classList.add('to-warning');
                    }
                    card.dataset.row = worker.row;

                    let suggestionHtml = '';
                    if (worker.suggested_to && !absentMode) {
                        suggestionHtml = `<span class="suggestion-badge">📋 минула ТО: ${worker.suggested_to}</span>`;
                    }

                    let warningHtml = '';
                    if (!worker.to && !worker.status && !absentMode) {
                        warningHtml = `<div class="warning-text">⚠️ Оберіть ТО</div>`;
                    }

                    let controlsHtml = '';
                    
                    if (absentMode) {
                        controlsHtml = `
                            <div class="field-group">
                                <label>📊 Статус:</label>
                                <select class="status-select" data-row="${worker.row}">
                                    <option value="">Виберіть статус</option>
                                    <option value="Вщ" ${worker.status === 'Вщ' ? 'selected' : ''}>🏖️ Вихідний (Вщ)</option>
                                    <option value="В" ${worker.status === 'В' ? 'selected' : ''}>🏖️ Відпустка (В)</option>
                                    <option value="На" ${worker.status === 'На' ? 'selected' : ''}>📚 За свій рахунок (На)</option>
                                    <option value="Пр" ${worker.status === 'Пр' ? 'selected' : ''}>😷 Прогул (Пр)</option>
                                    <option value="Нз" ${worker.status === 'Нз' ? 'selected' : ''}>❌ Не з\'явився (Нз)</option>
                                </select>
                            </div>
                            <button class="absent-action-btn" data-row="${worker.row}">✔️</button>
                        `;
                    } else {
                        let toSelectHtml = '';
                        if (worker.isCustomMode) {
                            toSelectHtml = `
                                <div class="field-group">
                                    <label>🔧 ТО (кастомне):</label>
                                    <input type="text" class="custom-input" id="custom-input-${worker.row}" placeholder="Введіть ТО" value="${worker.to || ''}">
                                    <button class="other-btn" onclick="window.saveCustomValue(${worker.row}, document.getElementById('custom-input-${worker.row}'))">✅ Зберегти</button>
                                </div>
                            `;
                        } else {
                            toSelectHtml = `
                                <div class="field-group">
                                    <label>🔧 ТО:</label>
                                    <select class="to-select" data-row="${worker.row}">
                                        <option value="">Виберіть ТО</option>
                                        ${operations.map(op => `<option value="${op}" ${worker.to === op ? 'selected' : ''}>${op}</option>`).join('')}
                                        <option value="__custom__">✏️ Інше (ввести вручну)</option>
                                    </select>
                                </div>
                            `;
                        }
                        
                        controlsHtml = `
                            ${toSelectHtml}
                            <div class="field-group">
                                <label>⏱️ Години:</label>
                                <input type="text" class="hours-input" data-row="${worker.row}" value="${worker.hours || defaultShiftHours}" placeholder="год">
                            </div>
                            <div class="field-group">
                                <label>📊 КТУ:</label>
                                <select class="ktu-select" data-row="${worker.row}">
                                    <option value="0.9" ${worker.ktu === 0.9 ? 'selected' : ''}>0.9</option>
                                    <option value="1" ${worker.ktu === 1 || !worker.ktu ? 'selected' : ''}>1</option>
                                    <option value="1.1" ${worker.ktu === 1.1 ? 'selected' : ''}>1.1</option>
                                    <option value="1.2" ${worker.ktu === 1.2 ? 'selected' : ''}>1.2</option>
                                    <option value="1.3" ${worker.ktu === 1.3 ? 'selected' : ''}>1.3</option>
                                </select>
                            </div>
                            <button class="action-btn" data-row="${worker.row}">✔️</button>
                            ${warningHtml}
                        `;
                    }

                    card.innerHTML = `
                        <div class="worker-name-row">
                            <div class="worker-name">
                                ${worker.isOutsourcer ? '<span class="outsourcer-badge">А</span>' : ''}
                                ${escapeHtml(worker.fullname)}
                                ${suggestionHtml}
                            </div>
                        </div>
                        <div class="worker-controls">
                            ${controlsHtml}
                        </div>
                    `;
                    container.appendChild(card);
                });

                attachEventHandlers();
            }

            function attachEventHandlers() {
                if (!absentMode) {
                    document.querySelectorAll('.to-select').forEach(select => {
                        select.onchange = (e) => {
                            const row = parseInt(select.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker && select.value !== '__custom__') {
                                worker.to = select.value;
                                worker.isCustomMode = false;
                                renderWorkersList();
                            } else if (select.value === '__custom__') {
                                worker.isCustomMode = true;
                                renderWorkersList();
                            }
                        };
                    });
                    
                    document.querySelectorAll('.hours-input').forEach(input => {
                        input.onchange = (e) => {
                            const row = parseInt(input.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker) {
                                worker.hours = input.value;
                            }
                        };
                    });
                    
                    document.querySelectorAll('.ktu-select').forEach(select => {
                        select.onchange = (e) => {
                            const row = parseInt(select.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker) {
                                worker.ktu = parseFloat(select.value);
                                worker.status = null;
                            }
                        };
                    });
                    
                    document.querySelectorAll('.action-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            e.preventDefault();
                            const row = parseInt(btn.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker) {
                                markPresent(worker);
                            }
                        };
                    });
                } else {
                    document.querySelectorAll('.status-select').forEach(select => {
                        select.onchange = (e) => {
                            const row = parseInt(select.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker) {
                                worker.status = select.value;
                                worker.ktu = null;
                            }
                        };
                    });
                    
                    document.querySelectorAll('.absent-action-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            e.preventDefault();
                            const row = parseInt(btn.dataset.row);
                            const worker = workersData.find(w => w.row === row);
                            if (worker) {
                                markAbsent(worker);
                            }
                        };
                    });
                }
            }

            async function syncToSheet() {
                const syncBtn = document.getElementById('sync-btn');
                syncBtn.disabled = true;
                syncBtn.innerHTML = '🔄 Синхронізація...';
                
                const dataToSave = workersData.map(worker => ({
                    row: worker.row,
                    fullname: worker.fullname,
                    to: worker.to || '',
                    hours: worker.hours || defaultShiftHours.toString(),
                    status: worker.status || null,
                    ktu: worker.ktu || null
                }));
                
                try {
                    const res = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ date: selectedDate, workers: dataToSave })
                    });
                    const result = await res.json();
                    if (result.ok) {
                        showToast('✅ Дані синхронізовано!', 'success');
                        await loadShiftData();
                    } else {
                        showToast(`❌ ${result.error}`, 'error');
                    }
                } catch(e) {
                    showToast('❌ Помилка синхронізації', 'error');
                } finally {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = '🔄 Синхронізувати з табелем';
                }
            }

            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, (m) => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            window.saveCustomValue = function(row, inputEl) {
                const worker = workersData.find(w => w.row === row);
                if (worker) {
                    worker.to = inputEl.value;
                    worker.isCustomMode = false;
                    renderWorkersList();
                    showToast(`✅ ТО змінено на: ${inputEl.value}`, 'success');
                }
            };

            const modal = document.getElementById('new-worker-modal');
            document.getElementById('add-worker-btn').onclick = () => {
                modal.style.display = 'flex';
            };
            document.getElementById('cancel-add-worker').onclick = () => {
                modal.style.display = 'none';
                document.getElementById('new-worker-name').value = '';
                document.querySelector('input[name="worker-type"][value="official"]').checked = true;
            };
            document.getElementById('confirm-add-worker').onclick = async () => {
                const name = document.getElementById('new-worker-name').value.trim();
                const isOutsourcer = document.querySelector('input[name="worker-type"]:checked').value === 'outsourcer';
                if (name) {
                    await addNewWorker(name, isOutsourcer);
                    modal.style.display = 'none';
                    document.getElementById('new-worker-name').value = '';
                    document.querySelector('input[name="worker-type"][value="official"]').checked = true;
                } else {
                    showToast('❌ Введіть ПІБ працівника', 'error');
                }
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.style.display = 'none';
            };

            shiftSelect.onchange = applyHoursToAll;

            flatpickr("#date-picker", {
                locale: "uk",
                dateFormat: "Y-m-d",
                defaultDate: selectedDate,
                onChange: (dates, dateStr) => {
                    selectedDate = dateStr;
                    absentMode = false;
                    const btn = document.getElementById('absent-mode-btn');
                    btn.classList.remove('absent-mode-active');
                    btn.innerHTML = '📋 Відмітити відсутніх';
                    modeBadge.innerHTML = '✅ Режим присутності';
                    modeBadge.className = 'mode-badge mode-normal';
                    loadShiftData();
                }
            });

            document.getElementById('absent-mode-btn').onclick = () => {
                absentMode = !absentMode;
                const btn = document.getElementById('absent-mode-btn');
                if (absentMode) {
                    btn.innerHTML = '✅ Повернутись до присутності';
                    btn.classList.add('absent-mode-active');
                    modeBadge.innerHTML = '📋 Режим відсутності';
                    modeBadge.className = 'mode-badge mode-active';
                } else {
                    btn.innerHTML = '📋 Відмітити відсутніх';
                    btn.classList.remove('absent-mode-active');
                    modeBadge.innerHTML = '✅ Режим присутності';
                    modeBadge.className = 'mode-badge mode-normal';
                }
                renderWorkersList();
            };

            document.getElementById('sync-btn').onclick = syncToSheet;

            checkConnection();
            loadOperations();
            loadShiftData();
            setInterval(checkConnection, 30000);
        })();
    </script>
</body>
</html>
