<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Облік цеху</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e0e0e0;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .shift-info {
            background: #f0f0f0;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            margin-top: 8px;
        }

        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        .mode-active {
            background: #ff9800;
            color: white;
        }

        .mode-normal {
            background: #10b981;
            color: white;
        }

        .date-selector {
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 16px;
        }

        .date-selector label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        #date-picker {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 28px;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
        }

        .workers-list {
            margin: 20px 0;
        }

        .worker-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 4px solid #667eea;
        }

        .worker-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .worker-name {
            font-weight: 700;
            font-size: 16px;
            color: #333;
        }

        .suggestion-badge {
            background: #e8ecf1;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #667eea;
        }

        .worker-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }

        .field-group {
            flex: 1;
            min-width: 100px;
        }

        .field-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .field-group select,
        .field-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 14px;
            background: #f9f9f9;
        }

        .sync-btn {
            width: 100%;
            margin: 15px 0;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 28px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sync-btn:active {
            transform: scale(0.98);
        }

        .sync-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .connection-status {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-indicator.connected {
            background: #10b981;
            box-shadow: 0 0 5px #10b981;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            box-shadow: 0 0 5px #ef4444;
        }

        .status-indicator.checking {
            background: #f59e0b;
            box-shadow: 0 0 5px #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 30px;
            color: #ef4444;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .flatpickr-calendar {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Цех <span id="workshop-name"></span></h1>
            <div class="shift-info">
                ⚙️ Зміна: <span id="shift-hours">8</span> год
                <span id="mode-badge" class="mode-badge mode-normal">✅ Режим присутності</span>
            </div>
        </div>

        <div class="date-selector">
            <label>📅 Оберіть дату:</label>
            <input type="text" id="date-picker" placeholder="Виберіть дату">
        </div>

        <div class="workers-list" id="workers-list">
            <div class="loading">Завантаження даних...</div>
        </div>

        <button id="sync-btn" class="sync-btn">🔄 Синхронізувати з табелем</button>

        <div class="connection-status" id="connection-status">
            <span class="status-indicator" id="status-indicator"></span>
            <span id="status-text">Перевірка підключення...</span>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const workshop = decodeURIComponent(window.location.pathname.split('/').pop());
            document.getElementById('workshop-name').innerText = workshop;

            let selectedDate = new Date().toISOString().split('T')[0];
            let workersData = [];
            let operations = [];

            // Перевірка підключення до Google Sheets
            async function checkConnection() {
                const indicator = document.getElementById('status-indicator');
                const text = document.getElementById('status-text');
                
                indicator.className = 'status-indicator checking';
                text.innerText = 'Перевірка підключення...';
                
                try {
                    const res = await fetch('/api/check-connection');
                    const data = await res.json();
                    
                    if (data.connected) {
                        indicator.className = 'status-indicator connected';
                        text.innerText = '✅ Підключено до Google Табелю';
                    } else {
                        indicator.className = 'status-indicator disconnected';
                        text.innerText = '❌ Немає зв\'язку з Google Табелем';
                    }
                } catch(e) {
                    indicator.className = 'status-indicator disconnected';
                    text.innerText = '❌ Помилка з\'єднання з сервером';
                }
            }

            // Завантаження списку операцій
            async function loadOperations() {
                try {
                    const res = await fetch('/api/operations');
                    const data = await res.json();
                    operations = data.operations || ['601', '602', '603', '475', '1088', '1256'];
                } catch(e) {
                    console.error('Failed to load operations:', e);
                    operations = ['601', '602', '603', '475', '1088', '1256'];
                }
            }

            // Завантаження даних за обрану дату
            async function loadShiftData() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '<div class="loading">📥 Завантаження даних...</div>';
                
                try {
                    const res = await fetch(`/api/shift-data?date=${selectedDate}`);
                    const data = await res.json();
                    
                    if (data.ok) {
                        workersData = data.workers || [];
                        renderWorkersList();
                    } else {
                        container.innerHTML = `<div class="error">❌ ${data.error || 'Помилка завантаження'}</div>`;
                    }
                } catch(e) {
                    console.error('Error loading shift data:', e);
                    container.innerHTML = '<div class="error">❌ Помилка завантаження даних</div>';
                }
            }

            // Відображення списку працівників
            function renderWorkersList() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '';
                
                if (!workersData || workersData.length === 0) {
                    container.innerHTML = '<div class="empty-message">📭 Немає працівників за обрану дату</div>';
                    return;
                }
                
                workersData.forEach(worker => {
                    const card = document.createElement('div');
                    card.className = 'worker-card';
                    card.dataset.row = worker.row;
                    card.dataset.fullname = worker.fullname;
                    
                    // Визначаємо значення КТУ або статусу
                    let valueHtml = '';
                    if (worker.status) {
                        valueHtml = `
                            <div class="field-group">
                                <label>📊 Статус:</label>
                                <select class="status-select" data-row="${worker.row}">
                                    <option value="">📋 Оберіть статус</option>
                                    <option value="Вщ" ${worker.status === 'Вщ' ? 'selected' : ''}>🏖️ Вихідний (Вщ)</option>
                                    <option value="Пр" ${worker.status === 'Пр' ? 'selected' : ''}>😷 Прогул (Пр)</option>
                                    <option value="На" ${worker.status === 'На' ? 'selected' : ''}>📚 Відпустка за свій рахунок (На)</option>
                                    <option value="Нз" ${worker.status === 'Нз' ? 'selected' : ''}>❌ Не з\'явився (Нз)</option>
                                </select>
                            </div>
                        `;
                    } else {
                        valueHtml = `
                            <div class="field-group">
                                <label>📊 КТУ:</label>
                                <select class="ktu-select" data-row="${worker.row}">
                                    <option value="0.9" ${worker.ktu === 0.9 ? 'selected' : ''}>0.9</option>
                                    <option value="1" ${worker.ktu === 1 || !worker.ktu ? 'selected' : ''}>1</option>
                                    <option value="1.1" ${worker.ktu === 1.1 ? 'selected' : ''}>1.1</option>
                                    <option value="1.2" ${worker.ktu === 1.2 ? 'selected' : ''}>1.2</option>
                                    <option value="1.3" ${worker.ktu === 1.3 ? 'selected' : ''}>1.3</option>
                                </select>
                            </div>
                        `;
                    }
                    
                    card.innerHTML = `
                        <div class="worker-info">
                            <span class="worker-name">${escapeHtml(worker.fullname)}</span>
                            ${worker.suggested_to ? `<span class="suggestion-badge">📋 з попереднього дня: ${worker.suggested_to}</span>` : ''}
                        </div>
                        <div class="worker-fields">
                            <div class="field-group">
                                <label>🔧 ТО:</label>
                                <select class="to-select" data-row="${worker.row}">
                                    <option value="">Виберіть ТО</option>
                                    ${operations.map(op => `<option value="${op}" ${worker.to === op ? 'selected' : ''}>${op}</option>`).join('')}
                                </select>
                            </div>
                            <div class="field-group">
                                <label>⏱️ Години:</label>
                                <input type="number" class="hours-input" data-row="${worker.row}" value="${worker.hours || ''}" step="0.5" min="0" max="12" placeholder="8-9">
                            </div>
                            ${valueHtml}
                        </div>
                    `;
                    container.appendChild(card);
                });
                
                attachEventHandlers();
            }

            function attachEventHandlers() {
                // TO selects
                document.querySelectorAll('.to-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) worker.to = select.value;
                    };
                });
                
                // Hours inputs
                document.querySelectorAll('.hours-input').forEach(input => {
                    input.onchange = (e) => {
                        const row = parseInt(input.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) worker.hours = input.value;
                    };
                });
                
                // KTU selects
                document.querySelectorAll('.ktu-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            worker.ktu = parseFloat(select.value);
                            worker.status = null;
                        }
                    };
                });
                
                // Status selects
                document.querySelectorAll('.status-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            worker.status = select.value;
                            worker.ktu = null;
                        }
                    };
                });
            }

            // Синхронізація з Google Sheets
            async function syncToSheet() {
                const syncBtn = document.getElementById('sync-btn');
                const originalText = syncBtn.innerHTML;
                syncBtn.innerHTML = '🔄 Синхронізація...';
                syncBtn.disabled = true;
                
                // Збираємо дані для збереження
                const dataToSave = workersData.map(worker => ({
                    row: worker.row,
                    fullname: worker.fullname,
                    to: worker.to || '',
                    hours: worker.hours || '',
                    status: worker.status || null,
                    ktu: worker.ktu || null
                }));
                
                try {
                    const res = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            date: selectedDate,
                            workers: dataToSave
                        })
                    });
                    
                    const result = await res.json();
                    
                    if (result.ok) {
                        showToast('✅ Дані успішно синхронізовано!', 'success');
                        await loadShiftData();
                    } else {
                        showToast(`❌ Помилка: ${result.error || 'Невідома помилка'}`, 'error');
                    }
                } catch(e) {
                    console.error('Sync error:', e);
                    showToast('❌ Помилка синхронізації', 'error');
                } finally {
                    syncBtn.innerHTML = originalText;
                    syncBtn.disabled = false;
                }
            }

            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, (m) => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // Ініціалізація календаря
            flatpickr("#date-picker", {
                locale: "uk",
                dateFormat: "Y-m-d",
                defaultDate: selectedDate,
                onChange: (dates, dateStr) => {
                    selectedDate = dateStr;
                    loadShiftData();
                }
            });

            // Кнопка синхронізації
            document.getElementById('sync-btn').onclick = syncToSheet;

            // Ініціалізація
            checkConnection();
            loadOperations();
            loadShiftData();
            
            // Перевірка підключення кожні 30 секунд
            setInterval(checkConnection, 30000);
        })();
    </script>
</body>
</html>
