<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Облік цеху</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        h1 { font-size: 22px; color: #333; }
        .shift-info {
            background: #f0f0f0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 6px;
        }
        .date-selector {
            margin: 12px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 16px;
        }
        .date-selector label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
        }
        #date-picker {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            text-align: center;
        }
        .workers-list { margin: 16px 0; }
        .worker-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-left: 3px solid #667eea;
            transition: all 0.3s;
        }
        .worker-card.removed { display: none; }
        .worker-card.outsourcer {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }
        .worker-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .worker-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .outsourcer-badge {
            background: #f59e0b;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .suggestion-badge {
            background: #e8ecf1;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            color: #667eea;
        }
        .worker-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .field-group {
            flex: 1;
            min-width: 80px;
        }
        .field-group label {
            display: block;
            font-size: 10px;
            color: #888;
            margin-bottom: 2px;
        }
        .to-select, .hours-input, .status-select, .ktu-select {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 12px;
            background: #f9f9f9;
        }
        .custom-input {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #f59e0b;
            font-size: 12px;
            background: #fff8e1;
        }
        .present-btn {
            background: #10b981;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .present-btn:active { transform: scale(0.95); }
        .submit-absent-btn {
            background: #f59e0b;
            border: none;
            border-radius: 28px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            min-width: 120px;
        }
        .submit-absent-btn:active { transform: scale(0.95); }
        .other-btn {
            background: #8b5cf6;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 11px;
            color: white;
            cursor: pointer;
            margin-top: 4px;
            width: 100%;
        }
        .absent-mode-btn, .sync-btn {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .absent-mode-btn {
            background: #f59e0b;
            color: white;
            border: none;
        }
        .sync-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
        }
        .absent-mode-active { background: #10b981 !important; }
        .connection-status {
            margin-top: 16px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-indicator.connected { background: #10b981; box-shadow: 0 0 4px #10b981; }
        .status-indicator.disconnected { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
        .status-indicator.checking { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .empty-message, .loading, .error {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #666;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 ЦЕХ <span id="workshop-name"></span></h1>
            <div class="shift-info">⚙️ Зміна: <span id="shift-hours">8</span> год</div>
        </div>

        <div class="date-selector">
            <label>📅 Дата:</label>
            <input type="text" id="date-picker" placeholder="Виберіть дату">
        </div>

        <div class="workers-list" id="workers-list">
            <div class="loading">📥 Завантаження...</div>
        </div>

        <button id="absent-mode-btn" class="absent-mode-btn">📋 Відмітити відсутніх</button>
        <button id="sync-btn" class="sync-btn">🔄 Синхронізувати з табелем</button>

        <div class="connection-status" id="connection-status">
            <span class="status-indicator" id="status-indicator"></span>
            <span id="status-text">Перевірка підключення...</span>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            let workshop = decodeURIComponent(window.location.pathname.split('/').pop());
            // Перетворюємо DMT на ДМТ для відображення
            if (workshop === 'DMT') workshop = 'ДМТ';
            document.getElementById('workshop-name').innerText = workshop;

            let selectedDate = new Date().toISOString().split('T')[0];
            let workersData = [];
            let operations = ['601', '602', '603', '475', '1088', '1256'];
            let absentMode = false;

            async function checkConnection() {
                const indicator = document.getElementById('status-indicator');
                const text = document.getElementById('status-text');
                indicator.className = 'status-indicator checking';
                text.innerText = 'Перевірка...';
                try {
                    const res = await fetch('/api/check-connection');
                    const data = await res.json();
                    if (data.connected) {
                        indicator.className = 'status-indicator connected';
                        text.innerText = '✅ Підключено до Google Табелю';
                    } else {
                        indicator.className = 'status-indicator disconnected';
                        text.innerText = '❌ Немає зв\'язку';
                    }
                } catch(e) {
                    indicator.className = 'status-indicator disconnected';
                    text.innerText = '❌ Помилка з\'єднання';
                }
            }

            async function loadOperations() {
                try {
                    const res = await fetch('/api/operations');
                    const data = await res.json();
                    if (data.operations) operations = data.operations;
                } catch(e) { console.error(e); }
            }

            async function loadShiftData() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '<div class="loading">📥 Завантаження...</div>';
                try {
                    const res = await fetch(`/api/shift-data?date=${selectedDate}`);
                    const data = await res.json();
                    if (data.ok) {
                        workersData = data.workers || [];
                        renderWorkersList();
                    } else {
                        container.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    }
                } catch(e) {
                    container.innerHTML = '<div class="error">❌ Помилка завантаження</div>';
                }
            }

            async function markPresent(worker) {
                try {
                    const response = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: selectedDate,
                            workers: [{
                                row: worker.row,
                                fullname: worker.fullname,
                                to: worker.to || '',
                                hours: worker.hours || '9',
                                status: null,
                                ktu: worker.ktu || 1
                            }]
                        })
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        showToast(`✅ ${worker.fullname} відмічено!`, 'success');
                        const card = document.querySelector(`.worker-card[data-row="${worker.row}"]`);
                        if (card) {
                            card.classList.add('removed');
                            setTimeout(() => card.remove(), 300);
                        }
                        workersData = workersData.filter(w => w.row !== worker.row);
                    } else {
                        showToast(`❌ Помилка: ${result.error}`, 'error');
                    }
                } catch(e) {
                    console.error('Error marking present:', e);
                    showToast('❌ Помилка відмітки', 'error');
                }
            }

            async function markAbsent(worker) {
                try {
                    const response = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: selectedDate,
                            workers: [{
                                row: worker.row,
                                fullname: worker.fullname,
                                to: worker.to || '',
                                hours: worker.hours || '',
                                status: worker.status || 'Вщ',
                                ktu: null
                            }]
                        })
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        showToast(`✅ ${worker.fullname} - ${worker.status || 'Вщ'} відмічено!`, 'success');
                        const card = document.querySelector(`.worker-card[data-row="${worker.row}"]`);
                        if (card) {
                            card.classList.add('removed');
                            setTimeout(() => card.remove(), 300);
                        }
                        workersData = workersData.filter(w => w.row !== worker.row);
                    } else {
                        showToast(`❌ Помилка: ${result.error}`, 'error');
                    }
                } catch(e) {
                    console.error('Error marking absent:', e);
                    showToast('❌ Помилка відмітки', 'error');
                }
            }

            function toggleCustomInput(workerRow, selectEl) {
                const worker = workersData.find(w => w.row === workerRow);
                if (!worker) return;
                
                if (selectEl.value === '__custom__') {
                    worker.isCustomMode = true;
                    renderWorkersList();
                }
            }

            function saveCustomValue(workerRow, inputEl) {
                const worker = workersData.find(w => w.row === workerRow);
                if (!worker) return;
                
                worker.to = inputEl.value;
                worker.isCustomMode = false;
                renderWorkersList();
                showToast(`✅ ТО змінено на: ${inputEl.value}`, 'success');
            }

            function renderWorkersList() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '';
                
                if (!workersData || workersData.length === 0) {
                    container.innerHTML = '<div class="empty-message">✅ Всі працівники відмічені!</div>';
                    return;
                }

                workersData.forEach(worker => {
                    const card = document.createElement('div');
                    card.className = 'worker-card';
                    if (worker.isOutsourcer) {
                        card.classList.add('outsourcer');
                    }
                    card.dataset.row = worker.row;

                    // Підказка про попередній день
                    let suggestionHtml = '';
                    if (worker.suggested_to) {
                        suggestionHtml = `<span class="suggestion-badge">📋 минула ТО: ${worker.suggested_to}</span>`;
                    }

                    let toSelectHtml = '';
                    if (worker.isCustomMode) {
                        toSelectHtml = `
                            <div class="field-group">
                                <label>🔧 ТО (кастомне):</label>
                                <input type="text" class="custom-input" id="custom-input-${worker.row}" placeholder="Введіть ТО" value="${worker.to || ''}">
                                <button class="other-btn" onclick="window.saveCustomValue(${worker.row}, document.getElementById('custom-input-${worker.row}'))">✅ Зберегти</button>
                            </div>
                        `;
                    } else {
                        toSelectHtml = `
                            <div class="field-group">
                                <label>🔧 ТО:</label>
                                <select class="to-select" data-row="${worker.row}">
                                    <option value="">Виберіть ТО</option>
                                    ${operations.map(op => `<option value="${op}" ${worker.to === op ? 'selected' : ''}>${op}</option>`).join('')}
                                    <option value="__custom__">✏️ Інше (ввести вручну)</option>
                                </select>
                            </div>
                        `;
                    }

                    let valueHtml = '';
                    if (absentMode) {
                        valueHtml = `
                            <div class="field-group">
                                <label>📊 Статус:</label>
                                <select class="status-select" data-row="${worker.row}" style="min-width:100px;">
                                    <option value="Вщ" ${worker.status === 'Вщ' ? 'selected' : ''}>🏖️ Вихідний</option>
                                    <option value="Пр" ${worker.status === 'Пр' ? 'selected' : ''}>😷 Прогул</option>
                                    <option value="На" ${worker.status === 'На' ? 'selected' : ''}>📚 Відпустка</option>
                                    <option value="Нз" ${worker.status === 'Нз' ? 'selected' : ''}>❌ Не з\'явився</option>
                                </select>
                            </div>
                            <button class="submit-absent-btn" data-row="${worker.row}">📤 Відправити</button>
                        `;
                    } else {
                        valueHtml = `
                            <div class="field-group">
                                <label>📊 КТУ:</label>
                                <select class="ktu-select" data-row="${worker.row}" style="min-width:60px;">
                                    <option value="0.9" ${worker.ktu === 0.9 ? 'selected' : ''}>0.9</option>
                                    <option value="1" ${worker.ktu === 1 || !worker.ktu ? 'selected' : ''}>1</option>
                                    <option value="1.1" ${worker.ktu === 1.1 ? 'selected' : ''}>1.1</option>
                                    <option value="1.2" ${worker.ktu === 1.2 ? 'selected' : ''}>1.2</option>
                                    <option value="1.3" ${worker.ktu === 1.3 ? 'selected' : ''}>1.3</option>
                                </select>
                            </div>
                            <button class="present-btn" data-row="${worker.row}">✔️</button>
                        `;
                    }

                    card.innerHTML = `
                        <div class="worker-name-row">
                            <div class="worker-name">
                                ${worker.isOutsourcer ? '<span class="outsourcer-badge">А</span>' : ''}
                                ${escapeHtml(worker.fullname)}
                                ${suggestionHtml}
                            </div>
                        </div>
                        <div class="worker-controls">
                            ${toSelectHtml}
                            <div class="field-group">
                                <label>⏱️ Години:</label>
                                <input type="number" class="hours-input" data-row="${worker.row}" value="${worker.hours || '9'}" step="0.5" min="0" max="12" placeholder="год">
                            </div>
                            ${valueHtml}
                        </div>
                    `;
                    container.appendChild(card);
                });

                attachEventHandlers();
            }

            function attachEventHandlers() {
                // TO selects
                document.querySelectorAll('.to-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker && select.value !== '__custom__') {
                            worker.to = select.value;
                            worker.isCustomMode = false;
                        } else if (select.value === '__custom__') {
                            worker.isCustomMode = true;
                            renderWorkersList();
                        }
                    };
                });
                
                // Hours inputs
                document.querySelectorAll('.hours-input').forEach(input => {
                    input.onchange = (e) => {
                        const row = parseInt(input.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) worker.hours = input.value;
                    };
                });
                
                // KTU selects
                document.querySelectorAll('.ktu-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            worker.ktu = parseFloat(select.value);
                            worker.status = null;
                        }
                    };
                });
                
                // Status selects
                document.querySelectorAll('.status-select').forEach(select => {
                    select.onchange = (e) => {
                        const row = parseInt(select.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            worker.status = select.value;
                            worker.ktu = null;
                        }
                    };
                });
                
                // Present buttons
                document.querySelectorAll('.present-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        const row = parseInt(btn.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            markPresent(worker);
                        }
                    };
                });
                
                // Submit absent buttons
                document.querySelectorAll('.submit-absent-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        const row = parseInt(btn.dataset.row);
                        const worker = workersData.find(w => w.row === row);
                        if (worker) {
                            if (!worker.status) {
                                showToast('❌ Виберіть статус відсутності!', 'error');
                                return;
                            }
                            markAbsent(worker);
                        }
                    };
                });
            }

            async function syncToSheet() {
                const syncBtn = document.getElementById('sync-btn');
                syncBtn.disabled = true;
                syncBtn.innerHTML = '🔄 Синхронізація...';
                
                const dataToSave = workersData.map(worker => ({
                    row: worker.row,
                    fullname: worker.fullname,
                    to: worker.to || '',
                    hours: worker.hours || '',
                    status: worker.status || null,
                    ktu: worker.ktu || null
                }));
                
                try {
                    const res = await fetch('/api/sync-shift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ date: selectedDate, workers: dataToSave })
                    });
                    const result = await res.json();
                    if (result.ok) {
                        showToast('✅ Дані синхронізовано!', 'success');
                        await loadShiftData();
                    } else {
                        showToast(`❌ ${result.error}`, 'error');
                    }
                } catch(e) {
                    showToast('❌ Помилка синхронізації', 'error');
                } finally {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = '🔄 Синхронізувати з табелем';
                }
            }

            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, (m) => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            window.saveCustomValue = function(row, inputEl) {
                const worker = workersData.find(w => w.row === row);
                if (worker) {
                    worker.to = inputEl.value;
                    worker.isCustomMode = false;
                    renderWorkersList();
                    showToast(`✅ ТО змінено на: ${inputEl.value}`, 'success');
                }
            };

            flatpickr("#date-picker", {
                locale: "uk",
                dateFormat: "Y-m-d",
                defaultDate: selectedDate,
                onChange: (dates, dateStr) => {
                    selectedDate = dateStr;
                    absentMode = false;
                    document.getElementById('absent-mode-btn').classList.remove('absent-mode-active');
                    document.getElementById('absent-mode-btn').innerHTML = '📋 Відмітити відсутніх';
                    loadShiftData();
                }
            });

            document.getElementById('absent-mode-btn').onclick = () => {
                absentMode = !absentMode;
                const btn = document.getElementById('absent-mode-btn');
                if (absentMode) {
                    btn.innerHTML = '✅ Повернутись до присутності';
                    btn.classList.add('absent-mode-active');
                } else {
                    btn.innerHTML = '📋 Відмітити відсутніх';
                    btn.classList.remove('absent-mode-active');
                }
                renderWorkersList();
            };

            document.getElementById('sync-btn').onclick = syncToSheet;

            checkConnection();
            loadOperations();
            loadShiftData();
            setInterval(checkConnection, 30000);
        })();
    </script>
</body>
</html>
