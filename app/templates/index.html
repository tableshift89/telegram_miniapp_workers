<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Облік цеху</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e0e0e0;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .shift-info {
            background: #f0f0f0;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            margin-top: 8px;
        }

        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        .mode-active {
            background: #ff9800;
            color: white;
        }

        .mode-normal {
            background: #10b981;
            color: white;
        }

        .add-worker {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .add-worker input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 16px;
        }

        .add-worker button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            cursor: pointer;
        }

        .worker-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .worker-card-absent {
            background: #fff8e1;
            border-left: 4px solid #ff9800;
        }

        .worker-name {
            font-weight: 600;
            font-size: 16px;
        }

        .worker-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ktu-select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }

        .present-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .absent-select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ff9800;
            background: #fff3e0;
            font-weight: 500;
            cursor: pointer;
        }

        .absent-submit-btn, .finish-btn {
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .finish-btn {
            width: 100%;
            margin-top: 15px;
            background: #10b981;
            padding: 14px;
            font-size: 16px;
        }

        button {
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.96);
        }

        #absent-mode-btn {
            width: 100%;
            margin: 15px 0;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #show-result {
            width: 100%;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        #result-table {
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 16px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .empty-message {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Цех <span id="workshop-name"></span></h1>
            <div class="shift-info">
                ⚙️ Зміна: <span id="shift-hours">8</span> год
                <span id="mode-badge" class="mode-badge mode-normal">✅ Режим присутності</span>
            </div>
        </div>

        <div class="add-worker">
            <input type="text" id="new-worker-name" placeholder="Прізвище Ім'я По батькові">
            <button id="add-worker-btn">➕ Додати</button>
        </div>

        <div class="workers-list" id="workers-list"></div>

        <button id="absent-mode-btn">📋 Проставити відсутніх</button>
        <button id="show-result">📊 Показати результат</button>
        <div id="result-table" style="display: none;"></div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const workshop = window.location.pathname.split('/').pop();
            document.getElementById('workshop-name').innerText = workshop;

            let currentShift = 8;
            let workers = [];
            let absentMode = false;
            let absentSelections = {};

            async function loadCurrentShift() {
                try {
                    const res = await fetch('/api/current_shift');
                    const data = await res.json();
                    currentShift = data.shift_hours;
                    document.getElementById('shift-hours').innerText = currentShift;
                } catch(e) {
                    console.error('Failed to load shift:', e);
                }
            }

            async function loadWorkers() {
                try {
                    const res = await fetch(`/api/workers/${encodeURIComponent(workshop)}`);
                    const data = await res.json();
                    workers = data.workers || [];
                    absentSelections = {};
                    workers.forEach(w => {
                        absentSelections[w.id] = 'Вщ';
                    });
                    renderWorkers();
                } catch(e) {
                    console.error('Failed to load workers:', e);
                }
            }

            async function submitAllAbsent() {
                if (workers.length === 0) {
                    tg.showPopup({
                        title: "Інформація",
                        message: "Немає невідмічених працівників",
                        buttons: [{type: "ok"}]
                    });
                    return;
                }

                tg.showPopup({
                    title: "Підтвердження",
                    message: `Відправити ${workers.length} працівників як відсутніх?`,
                    buttons: [
                        {id: "cancel", type: "cancel", text: "Скасувати"},
                        {id: "ok", type: "ok", text: "Так, відправити"}
                    ]
                }, async function(buttonId) {
                    if (buttonId === "ok") {
                        for (const w of workers) {
                            const status = absentSelections[w.id] || 'Вщ';
                            try {
                                await fetch('/api/mark_other', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({worker_id: w.id, status: status})
                                });
                            } catch(e) {
                                console.error('Error:', e);
                            }
                        }
                        workers = [];
                        renderWorkers();
                        exitAbsentMode();
                        tg.showPopup({
                            title: "✅ Готово!",
                            message: "Всіх відсутніх відправлено",
                            buttons: [{type: "ok"}]
                        });
                    }
                });
            }

            function exitAbsentMode() {
                absentMode = false;
                const btn = document.getElementById('absent-mode-btn');
                const badge = document.getElementById('mode-badge');
                btn.style.background = '#ff9800';
                btn.innerHTML = '📋 Проставити відсутніх';
                badge.innerHTML = '✅ Режим присутності';
                badge.className = 'mode-badge mode-normal';
                renderWorkers();
            }

            function renderWorkers() {
                const container = document.getElementById('workers-list');
                container.innerHTML = '';
                
                if (workers.length === 0) {
                    container.innerHTML = '<div class="empty-message">✅ Всі працівники відмічені на сьогодні!</div>';
                    return;
                }
                
                if (absentMode) {
                    workers.forEach(w => {
                        const card = document.createElement('div');
                        card.className = 'worker-card worker-card-absent';
                        card.dataset.id = w.id;
                        card.innerHTML = `
                            <span class="worker-name">${escapeHtml(w.fullname)}</span>
                            <div class="worker-actions">
                                <select class="absent-select" data-id="${w.id}">
                                    <option value="Вщ" ${absentSelections[w.id] === 'Вщ' ? 'selected' : ''}>🏖️ Відпустка (Вщ)</option>
                                    <option value="Пр" ${absentSelections[w.id] === 'Пр' ? 'selected' : ''}>😷 Прогул (Пр)</option>
                                    <option value="На" ${absentSelections[w.id] === 'На' ? 'selected' : ''}>📚 Навчання (На)</option>
                                    <option value="Нз" ${absentSelections[w.id] === 'Нз' ? 'selected' : ''}>❌ Неявка (Нз)</option>
                                </select>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                    
                    const finishBtn = document.createElement('button');
                    finishBtn.className = 'finish-btn';
                    finishBtn.innerHTML = '✅ Завершити та відправити всіх відсутніх';
                    finishBtn.onclick = submitAllAbsent;
                    container.appendChild(finishBtn);
                    
                    document.querySelectorAll('.absent-select').forEach(select => {
                        select.onchange = function(e) {
                            const id = parseInt(this.dataset.id);
                            absentSelections[id] = this.value;
                        };
                    });
                } else {
                    workers.forEach(w => {
                        const card = document.createElement('div');
                        card.className = 'worker-card';
                        card.dataset.id = w.id;
                        card.innerHTML = `
                            <span class="worker-name">${escapeHtml(w.fullname)}</span>
                            <div class="worker-actions">
                                <select class="ktu-select" data-id="${w.id}">
                                    <option value="0.9">0.9</option>
                                    <option value="1" selected>1</option>
                                    <option value="1.1">1.1</option>
                                    <option value="1.2">1.2</option>
                                    <option value="1.3">1.3</option>
                                </select>
                                <button class="present-btn" data-id="${w.id}">✅ Присутній</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                    
                    document.querySelectorAll('.present-btn').forEach(btn => {
                        btn.onclick = async function(e) {
                            e.stopPropagation();
                            const id = parseInt(this.dataset.id);
                            const ktuSelect = document.querySelector(`.ktu-select[data-id="${id}"]`);
                            const ktu = parseFloat(ktuSelect.value);
                            
                            try {
                                await fetch('/api/mark_present', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({worker_id: id, ktu: ktu, shift_hours: currentShift})
                                });
                                const card = document.querySelector(`.worker-card[data-id="${id}"]`);
                                if (card) card.remove();
                                workers = workers.filter(w => w.id !== id);
                            } catch(e) {
                                console.error('Error:', e);
                            }
                        };
                    });
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            document.getElementById('add-worker-btn').onclick = async function() {
                const name = document.getElementById('new-worker-name').value.trim();
                if (!name) return;
                
                try {
                    await fetch('/api/worker', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({fullname: name, workshop: workshop})
                    });
                    document.getElementById('new-worker-name').value = '';
                    await loadWorkers();
                } catch(e) {
                    console.error('Error:', e);
                }
            };

            const absentBtn = document.getElementById('absent-mode-btn');
            const modeBadge = document.getElementById('mode-badge');

            absentBtn.onclick = function() {
                if (workers.length === 0 && !absentMode) {
                    tg.showPopup({
                        title: "Інформація",
                        message: "Немає невідмічених працівників",
                        buttons: [{type: "ok"}]
                    });
                    return;
                }
                
                if (absentMode) {
                    absentMode = false;
                    absentBtn.style.background = '#ff9800';
                    absentBtn.innerHTML = '📋 Проставити відсутніх';
                    modeBadge.innerHTML = '✅ Режим присутності';
                    modeBadge.className = 'mode-badge mode-normal';
                    renderWorkers();
                } else {
                    absentMode = true;
                    absentBtn.style.background = '#10b981';
                    absentBtn.innerHTML = '🔙 Повернутись до присутності';
                    modeBadge.innerHTML = '📋 Режим відсутніх';
                    modeBadge.className = 'mode-badge mode-active';
                    renderWorkers();
                }
            };

            document.getElementById('show-result').onclick = async function() {
                try {
                    const res = await fetch('/api/report');
                    const data = await res.json();
                    
                    if (!data || data.length === 0) {
                        document.getElementById('result-table').innerHTML = '<p>Немає даних за сьогодні</p>';
                        document.getElementById('result-table').style.display = 'block';
                        return;
                    }
                    
                    let html = '<h3>📋 Результат відмічання</h3><table><tr><th>Працівник</th><th>Статус</th><th>КТУ</th><th>Годин</th></tr>';
                    data.forEach(row => {
                        let statusDisplay = '';
                        if (row.status === 'present') statusDisplay = '✅ Присутній';
                        else if (row.status === 'Вщ') statusDisplay = '🏖️ Відпустка';
                        else if (row.status === 'Пр') statusDisplay = '😷 Прогул';
                        else if (row.status === 'На') statusDisplay = '📚 Навчання';
                        else if (row.status === 'Нз') statusDisplay = '❌ Неявка';
                        else statusDisplay = row.status;
                        
                        html += `<tr><td>${escapeHtml(row.fullname)}</td><td>${statusDisplay}</td><td>${row.ktu}</td><td>${row.shift_hours}</td></tr>`;
                    });
                    html += '</table>';
                    
                    document.getElementById('result-table').innerHTML = html;
                    document.getElementById('result-table').style.display = 'block';
                } catch(e) {
                    console.error('Error:', e);
                }
            };

            loadCurrentShift();
            loadWorkers();
        })();
    </script>
</body>
</html>
