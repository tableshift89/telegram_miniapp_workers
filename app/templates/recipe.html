<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍗 Калькулятор рецептури курятини</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .ingredient {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .ingredient:last-child {
            border-bottom: none;
        }

        .ingredient-name {
            font-weight: 600;
            color: #333;
        }

        .ingredient-percent {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .ingredient-amount {
            font-weight: 700;
            color: #667eea;
        }

        .total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
        }

        .info-note {
            background: #fff3cd;
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            font-size: 12px;
            color: #856404;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍗 Калькулятор рецептури</h1>
        <div class="subtitle">Сире запаковане м'ясо курятини</div>

        <div class="form-group">
            <label>📦 Виберіть артикул продукту:</label>
            <select id="product-select">
                <option value="fresh_1110">🥩 Фреш 1110 (Філе куряче)</option>
                <option value="fresh_1120">🍗 Фреш 1120 (Стегно куряче)</option>
                <option value="fresh_1130">🍖 Фреш 1130 (Крильце куряче)</option>
                <option value="fresh_1140">🍗 Фреш 1140 (Гомілка куряча)</option>
            </select>
        </div>

        <div class="form-group">
            <label>⚖️ Кількість (кг):</label>
            <input type="number" id="weight" placeholder="Введіть кількість в кг" step="0.1" min="0.1">
        </div>

        <div class="result-card" id="result" style="display: none;">
            <div class="result-title" id="product-title"></div>
            <div id="ingredients-list"></div>
            <div class="total">
                <span>📦 Загальна вага:</span>
                <span id="total-weight">0 кг</span>
            </div>
            <div class="info-note" id="info-note"></div>
        </div>

        <button id="order-btn">📦 Замовити в склад</button>
        <div class="info-text">
            * Розрахунок: основа 80%, додаткові інгредієнти по 10% кожен
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const recipes = {
                "fresh_1110": {
                    name: "🥩 Фреш 1110 (Філе куряче)",
                    article: "Фреш 1110",
                    base: { name: "Велике філе куряче", percent: 80 },
                    ingredients: [
                        { name: "Мале філе куряче", percent: 10 },
                        { name: "Подрібнене філе", percent: 10 }
                    ],
                    note: "Для фаршу дрібного помелу"
                },
                "fresh_1120": {
                    name: "🍗 Фреш 1120 (Стегно куряче)",
                    article: "Фреш 1120",
                    base: { name: "Стегно без кістки", percent: 80 },
                    ingredients: [
                        { name: "Стегно з кісткою", percent: 10 },
                        { name: "Обрізки стегна", percent: 10 }
                    ],
                    note: "Для фаршу середнього помелу"
                },
                "fresh_1130": {
                    name: "🍖 Фреш 1130 (Крильце куряче)",
                    article: "Фреш 1130",
                    base: { name: "Крильце без кістки", percent: 80 },
                    ingredients: [
                        { name: "Крильце з кісткою", percent: 10 },
                        { name: "Обрізки крильця", percent: 10 }
                    ],
                    note: "Для фаршу крупного помелу"
                },
                "fresh_1140": {
                    name: "🍗 Фреш 1140 (Гомілка куряча)",
                    article: "Фреш 1140",
                    base: { name: "Гомілка без кістки", percent: 80 },
                    ingredients: [
                        { name: "Гомілка з кісткою", percent: 10 },
                        { name: "Обрізки гомілки", percent: 10 }
                    ],
                    note: "Для фаршу ніжного помелу"
                }
            };

            const productSelect = document.getElementById('product-select');
            const weightInput = document.getElementById('weight');
            const resultDiv = document.getElementById('result');
            const productTitle = document.getElementById('product-title');
            const ingredientsList = document.getElementById('ingredients-list');
            const totalWeightSpan = document.getElementById('total-weight');
            const infoNote = document.getElementById('info-note');
            const orderBtn = document.getElementById('order-btn');

            function calculateRecipe() {
                const productKey = productSelect.value;
                const weight = parseFloat(weightInput.value);
                
                if (!weight || weight <= 0) {
                    resultDiv.style.display = 'none';
                    return;
                }

                const recipe = recipes[productKey];
                if (!recipe) return;

                const baseAmount = weight * (recipe.base.percent / 100);
                const ingredientAmounts = recipe.ingredients.map(ing => ({
                    name: ing.name,
                    percent: ing.percent,
                    amount: weight * (ing.percent / 100)
                }));

                productTitle.innerHTML = `📋 ${recipe.name}`;
                
                let html = `
                    <div class="ingredient">
                        <span class="ingredient-name">🍗 ${recipe.base.name} <span class="ingredient-percent">(${recipe.base.percent}%)</span>:</span>
                        <span class="ingredient-amount">${baseAmount.toFixed(2)} кг</span>
                    </div>
                `;

                ingredientAmounts.forEach(ing => {
                    html += `
                        <div class="ingredient">
                            <span class="ingredient-name">➕ ${ing.name} <span class="ingredient-percent">(${ing.percent}%)</span>:</span>
                            <span class="ingredient-amount">${ing.amount.toFixed(2)} кг</span>
                        </div>
                    `;
                });

                ingredientsList.innerHTML = html;
                totalWeightSpan.innerText = `${weight.toFixed(2)} кг`;
                infoNote.innerHTML = `📌 ${recipe.note} | Артикул: ${recipe.article}`;
                resultDiv.style.display = 'block';
            }

            productSelect.addEventListener('change', calculateRecipe);
            weightInput.addEventListener('input', calculateRecipe);

            orderBtn.addEventListener('click', async () => {
                const productKey = productSelect.value;
                const weight = parseFloat(weightInput.value);
                
                if (!weight || weight <= 0) {
                    tg.showPopup({
                        title: "Помилка",
                        message: "Будь ласка, введіть кількість в кг",
                        buttons: [{type: "ok"}]
                    });
                    return;
                }

                const recipe = recipes[productKey];
                const baseAmount = weight * (recipe.base.percent / 100);
                const ingredientAmounts = recipe.ingredients.map(ing => ({
                    name: ing.name,
                    percent: ing.percent,
                    amount: weight * (ing.percent / 100)
                }));

                let message = `📦 *НОВЕ ЗАМОВЛЕННЯ НА СКЛАД*\n\n`;
                message += `🏷️ *Артикул:* ${recipe.article}\n`;
                message += `🍗 *Продукт:* ${recipe.name}\n`;
                message += `⚖️ *Загальна вага:* ${weight.toFixed(2)} кг\n\n`;
                message += `📋 *Склад рецептури:*\n`;
                message += `• ${recipe.base.name} (${recipe.base.percent}%): ${baseAmount.toFixed(2)} кг\n`;
                ingredientAmounts.forEach(ing => {
                    message += `• ${ing.name} (${ing.percent}%): ${ing.amount.toFixed(2)} кг\n`;
                });
                message += `\n📌 *Примітка:* ${recipe.note}`;

                try {
                    const response = await fetch('/api/order', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            product: recipe.article,
                            product_name: recipe.name,
                            weight: weight,
                            recipe: {
                                base: { name: recipe.base.name, percent: recipe.base.percent, amount: baseAmount },
                                ingredients: ingredientAmounts,
                                note: recipe.note
                            }
                        })
                    });

                    if (response.ok) {
                        tg.showPopup({
                            title: "✅ Замовлення відправлено!",
                            message: `${recipe.article}\n${weight.toFixed(2)} кг\n\nЗамовлення передано на склад.`,
                            buttons: [{type: "ok"}]
                        });
                        
                        tg.sendData(JSON.stringify({
                            type: 'order',
                            product: recipe.article,
                            weight: weight,
                            message: message
                        }));
                    } else {
                        tg.showPopup({
                            title: "Помилка",
                            message: "Не вдалося відправити замовлення",
                            buttons: [{type: "ok"}]
                        });
                    }
                } catch (error) {
                    console.error('Error:', error);
                    tg.showPopup({
                        title: "Помилка",
                        message: "Помилка з'єднання",
                        buttons: [{type: "ok"}]
                    });
                }
            });

            calculateRecipe();
        })();
    </script>
</body>
</html>
