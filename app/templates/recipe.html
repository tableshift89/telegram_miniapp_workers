<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍗 Калькулятор рецептури фаршу 10225</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
        }

        .subtitle {
            text-align: center;
            color: #2c3e50;
            font-size: 13px;
            margin-bottom: 24px;
            font-weight: 600;
            background: #e8ecf1;
            padding: 8px;
            border-radius: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 16px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid #2c3e50;
        }

        .ingredient {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .ingredient:last-child {
            border-bottom: none;
        }

        .ingredient-name {
            font-weight: 600;
            color: #333;
        }

        .ingredient-percent {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .ingredient-amount {
            font-weight: 700;
            color: #2c3e50;
        }

        .total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #2c3e50;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
        }

        .info-note {
            background: #fff3cd;
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            font-size: 12px;
            color: #856404;
        }

        .yield-note {
            background: #d1ecf1;
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            font-size: 12px;
            color: #0c5460;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 16px;
        }

        .placeholder-option {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍗 Калькулятор рецептури</h1>
        <div class="subtitle">Артикул: 10225 | Фарш філе пос. охл</div>

        <div class="form-group">
            <label>🔧 Виберіть варіант рецептури:</label>
            <select id="variant-select">
                <option value="" selected disabled class="placeholder-option">🔽 Оберіть готовий продукт</option>
                <option value="variant1">📋 Варіант 1 (9408 + 9387)</option>
                <option value="variant3">📋 Варіант 3 (9408 100%)</option>
                <option value="" disabled>━━━━━━━━━━━━━━━━━━━━</option>
                <option value="" disabled>-</option>
                <option value="" disabled>-</option>
                <option value="" disabled>-</option>
            </select>
        </div>

        <div class="form-group">
            <label>⚖️ Бажана вихідна вага готового фаршу (кг):</label>
            <input type="number" id="target-weight" placeholder="Введіть бажану вагу в кг" step="0.1" min="0.1">
        </div>

        <div class="result-card" id="result" style="display: none;">
            <div class="result-title" id="product-title">🍗 10225 Фарш філе пос. охл</div>
            <div id="ingredients-list"></div>
            <div class="total">
                <span>✅ Вихід готового фаршу:</span>
                <span id="final-yield">0 кг</span>
            </div>
            <div class="yield-note" id="yield-note">
                ⚙️ Вихід фаршу: 94% (втрати 6%)
            </div>
            <div class="info-note" id="info-note"></div>
        </div>

        <button id="order-btn">📦 Відправити запит на склад</button>
        <div class="info-text">
            * Розрахунок враховує вихід фаршу 94% (6% залишок/втрати)<br>
            * Всі значення округлюються до більшого цілого кілограма
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const YIELD_PERCENT = 94; // Вихід готового фаршу 94%
            
            const recipes = {
                variant1: {
                    name: "Варіант 1",
                    article: "10225",
                    product_name: "Фарш філе пос. охл",
                    ingredients: [
                        { code: "9408", name: "М'ясо філе дрібнок В", percent: 85 },
                        { code: "9387", name: "М'ясо філе дрібнок М", percent: 15 }
                    ],
                    note: "Стандартна рецептура з двома компонентами"
                },
                variant3: {
                    name: "Варіант 3",
                    article: "10225",
                    product_name: "Фарш філе пос. охл",
                    ingredients: [
                        { code: "9408", name: "М'ясо філе дрібнок В", percent: 100 }
                    ],
                    note: "Рецептура з одним компонентом 9408"
                }
            };

            const variantSelect = document.getElementById('variant-select');
            const targetWeightInput = document.getElementById('target-weight');
            const resultDiv = document.getElementById('result');
            const productTitle = document.getElementById('product-title');
            const ingredientsList = document.getElementById('ingredients-list');
            const finalYieldSpan = document.getElementById('final-yield');
            const infoNote = document.getElementById('info-note');
            const orderBtn = document.getElementById('order-btn');

            // Функція округлення до більшого цілого
            function roundUpToInt(value) {
                return Math.ceil(value);
            }

            function calculateRecipe() {
                const variantKey = variantSelect.value;
                const targetWeight = parseFloat(targetWeightInput.value);
                
                if (!variantKey || !targetWeight || targetWeight <= 0) {
                    resultDiv.style.display = 'none';
                    return;
                }

                const recipe = recipes[variantKey];
                if (!recipe) return;

                // Розрахунок необхідної сировини з урахуванням виходу 94%
                const requiredRawWeight = targetWeight / (YIELD_PERCENT / 100);
                
                const ingredientAmounts = recipe.ingredients.map(ing => ({
                    code: ing.code,
                    name: ing.name,
                    percent: ing.percent,
                    amountRaw: requiredRawWeight * (ing.percent / 100),
                    amount: roundUpToInt(requiredRawWeight * (ing.percent / 100))
                }));

                productTitle.innerHTML = `🍗 10225 ${recipe.product_name} (${recipe.name})`;
                
                let html = ``;

                ingredientAmounts.forEach(ing => {
                    html += `
                        <div class="ingredient">
                            <span class="ingredient-name">🍗 ${ing.code} - ${ing.name} <span class="ingredient-percent">(${ing.percent}%)</span>:</span>
                            <span class="ingredient-amount">${ing.amount} кг</span>
                        </div>
                    `;
                });

                ingredientsList.innerHTML = html;
                finalYieldSpan.innerText = `${targetWeight.toFixed(1)} кг`;
                
                const totalRawRounded = roundUpToInt(requiredRawWeight);
                infoNote.innerHTML = `📌 ${recipe.note}<br>📊 Для отримання ${targetWeight.toFixed(1)} кг готового фаршу потрібно сировини: ${totalRawRounded} кг (з урахуванням втрат 6%, округлено до більшого цілого)`;
                
                resultDiv.style.display = 'block';
            }

            function getCurrentDateTime() {
                const now = new Date();
                return now.toLocaleString('uk-UA', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }

            variantSelect.addEventListener('change', calculateRecipe);
            targetWeightInput.addEventListener('input', calculateRecipe);

            orderBtn.addEventListener('click', async () => {
                const variantKey = variantSelect.value;
                const targetWeight = parseFloat(targetWeightInput.value);
                
                if (!variantKey) {
                    tg.showPopup({
                        title: "❌ Помилка",
                        message: "Будь ласка, оберіть варіант рецептури",
                        buttons: [{type: "ok"}]
                    });
                    return;
                }
                
                if (!targetWeight || targetWeight <= 0) {
                    tg.showPopup({
                        title: "❌ Помилка",
                        message: "Будь ласка, введіть бажану вихідну вагу фаршу в кг",
                        buttons: [{type: "ok"}]
                    });
                    return;
                }

                const recipe = recipes[variantKey];
                const requiredRawWeight = targetWeight / (YIELD_PERCENT / 100);
                
                const ingredientAmounts = recipe.ingredients.map(ing => ({
                    code: ing.code,
                    name: ing.name,
                    percent: ing.percent,
                    amountRaw: requiredRawWeight * (ing.percent / 100),
                    amount: roundUpToInt(requiredRawWeight * (ing.percent / 100))
                }));

                const dateTime = getCurrentDateTime();
                
                // Формування повідомлення для попапу
                let popupMessage = `🍗 ЗАМОВЛЕННЯ НА СКЛАД\n`;
                popupMessage += `📅 ${dateTime}\n\n`;
                popupMessage += `🍗 Артикул: 10225\n`;
                popupMessage += `🍗 Продукт: Фарш філе пос. охл\n`;
                popupMessage += `🔧 Рецептура: ${recipe.name}\n\n`;
                popupMessage += `📋 ПОТРІБНО ЗАМОВИТИ:\n`;
                
                ingredientAmounts.forEach(ing => {
                    popupMessage += `• Артикул ${ing.code} (${ing.name}): ${ing.amount} кг\n`;
                });
                
                popupMessage += `\n✅ Очікуваний вихід: ${targetWeight.toFixed(1)} кг готового фаршу`;
                popupMessage += `\n📊 Враховано втрати: 6% (округлено до більшого цілого)`;

                // Формування повідомлення для відправки на склад
                let orderMessage = `🍗 *ЗАМОВЛЕННЯ НА СКЛАД*\n\n`;
                orderMessage += `📅 *Дата та час:* ${dateTime}\n\n`;
                orderMessage += `🍗 *Артикул:* 10225\n`;
                orderMessage += `🍗 *Продукт:* Фарш філе пос. охл\n`;
                orderMessage += `🔧 *Рецептура:* ${recipe.name}\n\n`;
                orderMessage += `📋 *Потрібно замовити сировину:*\n`;
                
                ingredientAmounts.forEach(ing => {
                    orderMessage += `• Артикул ${ing.code} (${ing.name}): ${ing.amount} кг\n`;
                });
                
                orderMessage += `\n✅ *Очікуваний вихід:* ${targetWeight.toFixed(1)} кг готового фаршу`;
                orderMessage += `\n📊 *Враховано втрати:* 6% (вихід 94%)`;
                orderMessage += `\n🔺 *Всі значення округлено до більшого цілого кг*`;

                try {
                    const response = await fetch('/api/order', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            article: "10225",
                            product_name: "Фарш філе пос. охл",
                            variant: recipe.name,
                            target_weight: targetWeight,
                            required_raw_weight: requiredRawWeight,
                            ingredients: ingredientAmounts,
                            date_time: dateTime
                        })
                    });

                    if (response.ok) {
                        tg.showPopup({
                            title: "✅ Замовлення відправлено!",
                            message: popupMessage,
                            buttons: [{type: "ok"}]
                        });
                        
                        tg.sendData(JSON.stringify({
                            type: 'order',
                            article: "10225",
                            variant: recipe.name,
                            target_weight: targetWeight,
                            ingredients: ingredientAmounts,
                            date_time: dateTime,
                            message: orderMessage
                        }));
                    } else {
                        tg.showPopup({
                            title: "❌ Помилка",
                            message: "Не вдалося відправити замовлення. Спробуйте ще раз.",
                            buttons: [{type: "ok"}]
                        });
                    }
                } catch (error) {
                    console.error('Error:', error);
                    tg.showPopup({
                        title: "❌ Помилка",
                        message: "Помилка з'єднання. Перевірте інтернет.",
                        buttons: [{type: "ok"}]
                    });
                }
            });

            // Початковий розрахунок не запускаємо, поки не обрано варіант
            resultDiv.style.display = 'none';
        })();
    </script>
</body>
</html>
